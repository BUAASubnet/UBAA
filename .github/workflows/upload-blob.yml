name: Build and Upload Web Wasm to Azure Blob Storage

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload-web-wasm:
    name: Build and Upload Web Wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Web Wasm
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
        run: ./gradlew :composeApp:wasmJsBrowserDistribution
      - name: Install AzCopy
        run: |
          set -euo pipefail
          curl -sL https://aka.ms/downloadazcopy-v10-linux -o azcopy.tar.gz
          tar -xf azcopy.tar.gz
          AZCOPY_DIR="$(find . -maxdepth 1 -type d -name 'azcopy_linux_amd64_*' | head -n 1)"
          sudo install "$AZCOPY_DIR/azcopy" /usr/local/bin/azcopy
          azcopy --version
      - name: Sync Web Wasm to Azure Blob Static Website
        env:
          AZURE_STORAGE_WEB_URL: ${{ secrets.AZURE_STORAGE_WEB_URL }}
        run: |
          set -euo pipefail

          if [[ -z "${AZURE_STORAGE_WEB_URL:-}" ]]; then
            echo "AZURE_STORAGE_WEB_URL is not set."
            exit 1
          fi

          echo "::add-mask::$AZURE_STORAGE_WEB_URL"

          azcopy sync \
            "composeApp/build/dist/wasmJs/productionExecutable" \
            "$AZURE_STORAGE_WEB_URL" \
            --recursive \
            --delete-destination=true
