<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBAA</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="./favicon-32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="./favicon-16.png" sizes="16x16">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1976d2">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link type="text/css" rel="stylesheet" href="./styles.css">
    <style>
        .survey-prompt-overlay {
            position: fixed;
            inset: 0;
            z-index: 2147483647;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.45);
            box-sizing: border-box;
        }

        .survey-prompt-dialog {
            width: min(100%, 380px);
            padding: 22px;
            border-radius: 8px;
            background: #ffffff;
            color: #111827;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.24);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            box-sizing: border-box;
        }

        .survey-prompt-title {
            margin: 0 0 10px;
            font-size: 18px;
            font-weight: 650;
            line-height: 1.35;
        }

        .survey-prompt-message {
            margin: 0 0 18px;
            font-size: 14px;
            line-height: 1.7;
            color: #374151;
        }

        .survey-prompt-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        .survey-prompt-button,
        .survey-prompt-link {
            min-height: 40px;
            padding: 0 14px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            font: inherit;
            font-size: 14px;
            line-height: 38px;
            text-decoration: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        .survey-prompt-link {
            border-color: #1976d2;
            background: #1976d2;
            color: #ffffff;
        }

        .survey-prompt-button {
            background: #ffffff;
            color: #111827;
        }
    </style>
    <script>
        (() => {
            const loadApp = () => {
                if (document.querySelector('script[data-ubaa-app="true"]')) {
                    return;
                }
                const script = document.createElement('script');
                script.type = 'application/javascript';
                script.src = './composeApp.js';
                script.dataset.ubaaApp = 'true';
                document.head.appendChild(script);
            };

            const registerServiceWorker = async () => {
                if (!('serviceWorker' in navigator)) {
                    return;
                }
                try {
                    await navigator.serviceWorker.register('./sw.js', { scope: './' });
                } catch (error) {
                    console.warn('[UBAA] Failed to register service worker.', error);
                }
            };

            window.addEventListener('load', async () => {
                await registerServiceWorker();
                loadApp();
            });
        })();
    </script>
</head>

<body>
    <div id="app-loader">
        <div class="spinner"></div>
        <div class="loading-text">UBAA Loading...</div>
    </div>
    <script>
        (() => {
            const storageKey = 'ubaa-survey-completed-v1';
            const surveyUrl = 'https://v.wjx.cn/vm/QsqQU1r.aspx#';

            const getSurveyCompleted = () => {
                try {
                    return window.localStorage.getItem(storageKey) === 'true';
                } catch (error) {
                    return false;
                }
            };

            const setSurveyCompleted = () => {
                try {
                    window.localStorage.setItem(storageKey, 'true');
                } catch (error) {
                    console.warn('[UBAA] Failed to persist survey prompt state.', error);
                }
            };

            const showSurveyPrompt = () => {
                if (getSurveyCompleted() || document.querySelector('[data-ubaa-survey-prompt="true"]')) {
                    return;
                }

                const overlay = document.createElement('div');
                overlay.className = 'survey-prompt-overlay';
                overlay.dataset.ubaaSurveyPrompt = 'true';
                overlay.setAttribute('role', 'dialog');
                overlay.setAttribute('aria-modal', 'true');
                overlay.setAttribute('aria-labelledby', 'survey-prompt-title');

                const dialog = document.createElement('div');
                dialog.className = 'survey-prompt-dialog';

                const title = document.createElement('h2');
                title.id = 'survey-prompt-title';
                title.className = 'survey-prompt-title';
                title.textContent = '问卷填写提示';

                const message = document.createElement('p');
                message.className = 'survey-prompt-message';
                message.textContent = '欢迎填写 UBAA 使用反馈问卷。填写完成后点击“已完成”，之后将不再弹出此提示。';

                const actions = document.createElement('div');
                actions.className = 'survey-prompt-actions';

                const surveyLink = document.createElement('a');
                surveyLink.className = 'survey-prompt-link';
                surveyLink.href = surveyUrl;
                surveyLink.target = '_blank';
                surveyLink.rel = 'noopener noreferrer';
                surveyLink.textContent = '填写问卷';

                const doneButton = document.createElement('button');
                doneButton.className = 'survey-prompt-button';
                doneButton.type = 'button';
                doneButton.textContent = '已完成';
                doneButton.addEventListener('click', () => {
                    setSurveyCompleted();
                    overlay.remove();
                });

                actions.append(surveyLink, doneButton);
                dialog.append(title, message, actions);
                overlay.append(dialog);
                document.body.append(overlay);
            };

            window.addEventListener('load', () => {
                window.setTimeout(showSurveyPrompt, 800);
            });
        })();
    </script>
</body>

</html>
